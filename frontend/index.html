<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Branding -->
    <title>Enterprise AI Workforce — HR · IT · Finance Assistant</title>
    <meta name="description" content="Multi-agent AI platform for enterprise HR, IT, and Finance queries. Built for UAE/GCC organisations with policy-aware RAG, human approval workflows, and real-time streaming." />
    <meta name="application-name" content="Enterprise AI Workforce" />
    <meta name="author" content="Syed Hussain" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Open Graph (LinkedIn / Slack previews) -->
    <meta property="og:type"        content="website" />
    <meta property="og:title"       content="Enterprise AI Workforce" />
    <meta property="og:description" content="Multi-agent AI platform for HR, IT &amp; Finance — UAE/GCC enterprise grade." />
    <meta property="og:image"       content="/icons.svg" />

    <!-- Security -->
    <!-- Content-Security-Policy is set via Vercel headers (vercel.json) for the full HTML response.
         The meta tag below is a defence-in-depth fallback for non-Vercel environments. -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="X-Frame-Options"        content="DENY" />

    <!-- Performance hints -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
