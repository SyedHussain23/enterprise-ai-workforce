name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# ─────────────────────────────────────────────────────────────────────────────
# SETUP INSTRUCTIONS
# ─────────────────────────────────────────────────────────────────────────────
# To enable Railway deployment:
#   1. Go to Settings → Secrets and variables → Actions
#   2. Add secret:  RAILWAY_TOKEN   (from railway.app → Account Settings → Tokens)
#   3. Add variable: RAILWAY_ENABLED = true
#
# To enable Vercel deployment:
#   1. Add secrets:  VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID
#   2. Add variable: VERCEL_ENABLED = true
#
# Until these are configured, deploy jobs are skipped (not failed).
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  # ── Gate: check which deployments are configured ───────────────────────────
  check-config:
    name: Check deployment config
    runs-on: ubuntu-latest
    outputs:
      railway: ${{ steps.gate.outputs.railway }}
      vercel:  ${{ steps.gate.outputs.vercel }}

    steps:
      - name: Evaluate deployment gates
        id: gate
        env:
          RAILWAY_ENABLED: ${{ vars.RAILWAY_ENABLED }}
          VERCEL_ENABLED:  ${{ vars.VERCEL_ENABLED }}
        run: |
          echo "railway=${RAILWAY_ENABLED:-false}" >> "$GITHUB_OUTPUT"
          echo "vercel=${VERCEL_ENABLED:-false}"   >> "$GITHUB_OUTPUT"

  # ── Deploy backend to Railway ────────────────────────────────────────────────
  deploy-backend:
    name: Deploy API → Railway
    runs-on: ubuntu-latest
    needs: check-config
    if: needs.check-config.outputs.railway == 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service enterprise-ai-api --detach

  # ── Deploy frontend to Vercel ─────────────────────────────────────────────────
  deploy-frontend:
    name: Deploy UI → Vercel
    runs-on: ubuntu-latest
    needs: [check-config, deploy-backend]
    # Run even if deploy-backend was skipped (result = 'skipped')
    if: |
      needs.check-config.outputs.vercel == 'true' &&
      (needs.deploy-backend.result == 'success' || needs.deploy-backend.result == 'skipped')

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy to Vercel
        working-directory: frontend
        env:
          VERCEL_TOKEN:      ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel --prod --token=$VERCEL_TOKEN --yes
