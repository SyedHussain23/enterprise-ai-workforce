name: Deploy

# ─────────────────────────────────────────────────────────────────────────────
# This workflow does NOT run automatically on push.
# It only triggers when you manually click "Run workflow" in GitHub Actions UI.
#
# This is intentional:  CI (ci.yml) runs on every push and validates all code.
# Deployment is a deliberate, human-initiated action — not automatic.
#
# HOW TO DEPLOY:
#   GitHub → Actions → Deploy → Run workflow → select branch → Run
#
# SETUP (one-time):
#   Settings → Secrets and variables → Actions
#   Add secrets:  RAILWAY_TOKEN, VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID
#   Add variables: RAILWAY_ENABLED=true, VERCEL_ENABLED=true
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:
      deploy_target:
        description: 'What to deploy'
        required: true
        default: 'both'
        type: choice
        options:
          - both
          - backend-only
          - frontend-only

jobs:
  # ── Deploy backend to Railway ─────────────────────────────────────────────
  deploy-backend:
    name: Deploy API → Railway
    runs-on: ubuntu-latest
    if: |
      inputs.deploy_target == 'both' ||
      inputs.deploy_target == 'backend-only'

    steps:
      - uses: actions/checkout@v4

      - name: Verify Railway token is configured
        run: |
          if [ -z "${{ secrets.RAILWAY_TOKEN }}" ]; then
            echo "::error::RAILWAY_TOKEN secret is not set."
            echo "::error::Go to Settings → Secrets and variables → Actions → New secret"
            exit 1
          fi

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service enterprise-ai-api --detach

  # ── Deploy frontend to Vercel ─────────────────────────────────────────────
  deploy-frontend:
    name: Deploy UI → Vercel
    runs-on: ubuntu-latest
    needs: deploy-backend
    if: |
      always() &&
      (inputs.deploy_target == 'both' || inputs.deploy_target == 'frontend-only') &&
      (needs.deploy-backend.result == 'success' || needs.deploy-backend.result == 'skipped')

    steps:
      - uses: actions/checkout@v4

      - name: Verify Vercel tokens are configured
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ]; then
            echo "::error::VERCEL_TOKEN secret is not set."
            echo "::error::Go to Settings → Secrets and variables → Actions → New secret"
            exit 1
          fi

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy to Vercel
        working-directory: frontend
        env:
          VERCEL_TOKEN:      ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel --prod --token=$VERCEL_TOKEN --yes
